name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t mahirahmed93/gitops:${{ github.sha }} .
          docker push mahirahmed93/gitops:${{ github.sha }}

      - name: Update Kubernetes manifests with new image tag
        run: |
          sed -i "s|image: mahirahmed93/gitops:.*|image: mahirahmed93/gitops:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit and push updated Kubernetes manifests
        uses: EndBug/add-and-commit@v7
        with:
          author_name: 'GitHub Actions'
          author_email: 'actions@github.com'
          message: 'Update Kubernetes deployment with new image tag'
          add: 'k8s/deployment.yaml'
